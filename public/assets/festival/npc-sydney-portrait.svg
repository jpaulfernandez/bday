<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <clipPath id="portraitCircleSydney">
      <circle cx="150" cy="172" r="140"/>
    </clipPath>
    <linearGradient id="bgGradSydney" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2E6"/>
      <stop offset="100%" stop-color="#FCDAD7"/>
    </linearGradient>
    <filter id="softShadowSydney" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4E3524" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Soft cream/rose backdrop circle -->
  <circle cx="150" cy="172" r="140" fill="url(#bgGradSydney)"/>

  <!-- Decorative floating sakura petals -->
  <g clip-path="url(#portraitCircleSydney)" opacity="0.4">
    <path d="M 60 100 Q 68 95 72 103 Q 66 112 58 106 Q 54 98 60 100 Z" fill="#FF8DA1"/>
    <path d="M 230 80 Q 240 78 242 88 Q 234 96 226 90 Q 224 82 230 80 Z" fill="#FF8DA1"/>
    <path d="M 40 220 Q 50 216 52 226 Q 44 236 36 228 Q 34 220 40 220 Z" fill="#FF8DA1"/>
    <path d="M 250 240 Q 258 234 262 244 Q 254 254 246 246 Q 244 238 250 240 Z" fill="#FF8DA1"/>
  </g>

  <!-- MAIN PORTRAIT CONTENT -->
  <g clip-path="url(#portraitCircleSydney)">
    <!-- Back hair behind neck -->
    <path d="M 110 180 Q 100 230 105 260 L 195 260 Q 200 230 190 180 Z" fill="#2C1D11"/>

    <!-- Outfit: Olive tee under Cream knitted V-neck sweater -->
    <path d="M 80 344 Q 90 260 120 245 L 180 245 Q 210 260 220 344 Z" fill="#4B5338" stroke="#2C1D11" stroke-width="2"/>
    <path d="M 50 344 Q 60 250 110 236 L 190 236 Q 240 250 250 344 Z" fill="#F5EFE6" stroke="#2C1D11" stroke-width="2.2" stroke-linejoin="round" filter="url(#softShadowSydney)"/>
    <!-- V-neck collar & shading -->
    <path d="M 110 236 L 150 286 L 190 236 Z" fill="#4B5338" stroke="#2C1D11" stroke-width="2"/>
    <path d="M 110 236 L 150 286 L 120 286 Z" fill="#3A402B"/>
    <!-- Sweater ribbing and texture -->
    <path d="M 100 300 L 100 344" stroke="#DCD0B8" stroke-width="2.5" stroke-dasharray="8,6"/>
    <path d="M 200 300 L 200 344" stroke="#DCD0B8" stroke-width="2.5" stroke-dasharray="8,6"/>

    <!-- Neck -->
    <path d="M 136 190 L 136 245 Q 150 250 164 245 L 164 190 Z" fill="#ECA67E"/>
    <path d="M 136 205 Q 150 217 164 205 L 164 190 L 136 190 Z" fill="#D38C64" opacity="0.65"/>

    <!-- Face & Head -->
    <path d="M 104 130
             C 104 85 124 65 150 65
             C 176 65 196 85 196 130
             C 196 160 188 182 172 196
             C 164 203 156 207 150 207
             C 144 207 136 203 128 196
             C 112 182 104 160 104 130 Z"
          fill="#ECA67E" stroke="#2C1D11" stroke-width="2"/>

    <!-- Ears -->
    <ellipse cx="101" cy="146" rx="7.5" ry="12" fill="#ECA67E" stroke="#2C1D11" stroke-width="1.8"/>
    <ellipse cx="199" cy="146" rx="7.5" ry="12" fill="#ECA67E" stroke="#2C1D11" stroke-width="1.8"/>
    <!-- Gold earrings -->
    <circle cx="101" cy="158" r="3.5" fill="#FFD700" stroke="#B39700" stroke-width="1"/>
    <circle cx="199" cy="158" r="3.5" fill="#FFD700" stroke="#B39700" stroke-width="1"/>

    <!-- Cheeks Blush -->
    <ellipse cx="118" cy="164" rx="12" ry="6.5" fill="#E56B55" opacity="0.55"/>
    <ellipse cx="182" cy="164" rx="12" ry="6.5" fill="#E56B55" opacity="0.55"/>

    <!-- Eyebrows -->
    <path d="M 110 123 Q 123 115 137 121" fill="none" stroke="#2C1D11" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M 190 123 Q 177 115 163 121" fill="none" stroke="#2C1D11" stroke-width="3.6" stroke-linecap="round"/>

    <!-- Eyes -->
    <path d="M 112 142 Q 125 133 138 141 Q 137 154 125 155 Q 114 154 112 142 Z" fill="#FFFFFF"/>
    <circle cx="127" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="127" cy="145" r="4" fill="#110B06"/>
    <circle cx="129.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="124" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 110 141 Q 124 130 140 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <path d="M 188 142 Q 175 133 162 141 Q 163 154 175 155 Q 186 154 188 142 Z" fill="#FFFFFF"/>
    <circle cx="173" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="173" cy="145" r="4" fill="#110B06"/>
    <circle cx="175.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="170" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 190 141 Q 176 130 160 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 148 156 Q 146 166 150 169 Q 153 171 156 168" fill="none" stroke="#BD7752" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Big warm smile with braces -->
    <path d="M 125 178 Q 150 198 175 178 Q 150 183 125 178 Z" fill="#FFFFFF" stroke="#A83C2C" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 129 184 Q 150 191 171 184" stroke="#B0BEC5" stroke-width="2.5" fill="none"/>
    <circle cx="138" cy="186" r="1.8" fill="#90A4AE"/>
    <circle cx="150" cy="187.5" r="1.8" fill="#90A4AE"/>
    <circle cx="162" cy="186" r="1.8" fill="#90A4AE"/>

    <!-- Hair side bangs framing face under cap -->
    <path d="M 102 115 C 94 140 98 165 95 182 C 94 188 98 190 102 185 C 105 178 103 150 108 125 Z" fill="#2C1D11" stroke="#2C1D11" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M 198 115 C 206 140 202 165 205 182 C 206 188 202 190 198 185 C 195 178 197 150 192 125 Z" fill="#2C1D11" stroke="#2C1D11" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Red BOSTON baseball cap -->
    <g filter="url(#softShadowSydney)">
      <!-- Cap crown -->
      <path d="M 85 105 Q 85 45 150 45 Q 215 45 215 105 Z" fill="#C62828" stroke="#2C1D11" stroke-width="2.5"/>
      <!-- Panel seams -->
      <path d="M 150 45 C 140 65 140 85 140 105" fill="none" stroke="#A71B1B" stroke-width="2"/>
      <path d="M 150 45 C 160 65 160 85 160 105" fill="none" stroke="#A71B1B" stroke-width="2"/>
      <!-- Top button -->
      <circle cx="150" cy="43" r="5" fill="#B71C1C" stroke="#2C1D11" stroke-width="1.5"/>
      <!-- Curved Visor brim pointing forward and slightly right -->
      <path d="M 75 102 C 90 118 210 118 225 102 C 235 110 220 128 150 128 C 80 128 65 110 75 102 Z" fill="#D32F2F" stroke="#2C1D11" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- White BOSTON text on cap -->
      <text x="150" y="96" font-family="sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">BOSTON</text>
    </g>

    <!-- Playful sparkle stars -->
    <g fill="#FFD700" opacity="0.85">
      <path d="M 75 90 Q 75 85 70 85 Q 75 85 75 80 Q 75 85 80 85 Q 75 85 75 90 Z"/>
      <path d="M 235 85 Q 235 81 231 81 Q 235 81 235 77 Q 235 81 239 81 Q 235 81 235 85 Z"/>
    </g>
  </g>

  <!-- Outer frame rings -->
  <circle cx="150" cy="172" r="140" fill="none" stroke="#EBDDBE" stroke-width="6"/>
  <circle cx="150" cy="172" r="143.5" fill="none" stroke="#E2D2AC" stroke-width="1.5"/>
</svg>
