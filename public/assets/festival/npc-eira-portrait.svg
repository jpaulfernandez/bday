<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <clipPath id="portraitCircleEira">
      <circle cx="150" cy="172" r="140"/>
    </clipPath>
    <linearGradient id="bgGradEira" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="softShadowEira" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Soft sky/blue backdrop circle -->
  <circle cx="150" cy="172" r="140" fill="url(#bgGradEira)"/>

  <!-- Decorative floating stars/blossoms -->
  <g clip-path="url(#portraitCircleEira)" opacity="0.45">
    <path d="M 60 100 Q 68 95 72 103 Q 66 112 58 106 Q 54 98 60 100 Z" fill="#60A5FA"/>
    <path d="M 230 80 Q 240 78 242 88 Q 234 96 226 90 Q 224 82 230 80 Z" fill="#3B82F6"/>
    <path d="M 40 220 Q 50 216 52 226 Q 44 236 36 228 Q 34 220 40 220 Z" fill="#93C5FD"/>
    <path d="M 250 240 Q 258 234 262 244 Q 254 254 246 246 Q 244 238 250 240 Z" fill="#60A5FA"/>
    <circle cx="85" cy="150" r="3" fill="#2563EB"/>
    <circle cx="220" cy="180" r="2.5" fill="#3B82F6"/>
  </g>

  <!-- MAIN PORTRAIT CONTENT -->
  <g clip-path="url(#portraitCircleEira)">
    <!-- Back long hair flowing down back -->
    <path d="M 80 160 Q 70 250 75 310 L 225 310 Q 230 250 220 160 Z" fill="#1A1A1A"/>

    <!-- Outfit: White collared top under Navy denim jacket with round silver buttons -->
    <!-- White top base -->
    <path d="M 80 344 Q 90 260 120 245 L 180 245 Q 210 260 220 344 Z" fill="#FAF6EC" stroke="#0F172A" stroke-width="2"/>
    <!-- White collar points -->
    <path d="M 120 245 L 150 275 L 130 285 L 105 255 Z" fill="#FAF6EC" stroke="#0F172A" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M 180 245 L 150 275 L 170 285 L 195 255 Z" fill="#FAF6EC" stroke="#0F172A" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Navy denim jacket draped over shoulders -->
    <path d="M 45 344 Q 55 250 110 236 L 190 236 Q 245 250 255 344 Z" fill="#1E3A5F" stroke="#0F172A" stroke-width="2.2" stroke-linejoin="round" filter="url(#softShadowEira)"/>
    <!-- Open jacket trim -->
    <path d="M 110 236 L 110 344" stroke="#1E3A5F" stroke-width="12"/>
    <path d="M 190 236 L 190 344" stroke="#1E3A5F" stroke-width="12"/>
    <!-- Jacket collar / lapels -->
    <path d="M 110 236 L 140 275 L 125 285 L 95 248 Z" fill="#172E4D" stroke="#0F172A" stroke-width="1.8"/>
    <path d="M 190 236 L 160 275 L 175 285 L 205 248 Z" fill="#172E4D" stroke="#0F172A" stroke-width="1.8"/>
    <!-- Denim stitching -->
    <path d="M 116 260 L 116 344" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6,4"/>
    <path d="M 184 260 L 184 344" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6,4"/>
    <!-- Round silver pearl buttons on jacket placket -->
    <circle cx="120" cy="275" r="4.5" fill="#E2E8F0" stroke="#64748B" stroke-width="1.2"/>
    <circle cx="120" cy="305" r="4.5" fill="#E2E8F0" stroke="#64748B" stroke-width="1.2"/>
    <circle cx="120" cy="335" r="4.5" fill="#E2E8F0" stroke="#64748B" stroke-width="1.2"/>
    <circle cx="180" cy="275" r="4.5" fill="#E2E8F0" stroke="#64748B" stroke-width="1.2"/>
    <circle cx="180" cy="305" r="4.5" fill="#E2E8F0" stroke="#64748B" stroke-width="1.2"/>

    <!-- Neck -->
    <path d="M 136 190 L 136 245 Q 150 250 164 245 L 164 190 Z" fill="#F3CBA5"/>
    <path d="M 136 205 Q 150 217 164 205 L 164 190 L 136 190 Z" fill="#E0AF83" opacity="0.65"/>

    <!-- Face & Head -->
    <path d="M 104 130
             C 104 85 124 65 150 65
             C 176 65 196 85 196 130
             C 196 160 188 182 172 196
             C 164 203 156 207 150 207
             C 144 207 136 203 128 196
             C 112 182 104 160 104 130 Z"
          fill="#F3CBA5" stroke="#0F172A" stroke-width="2"/>

    <!-- Ears -->
    <ellipse cx="101" cy="146" rx="7.5" ry="12" fill="#F3CBA5" stroke="#0F172A" stroke-width="1.8"/>
    <ellipse cx="199" cy="146" rx="7.5" ry="12" fill="#F3CBA5" stroke="#0F172A" stroke-width="1.8"/>

    <!-- Jawline shadow under chin -->
    <path d="M 128 195 Q 150 208 172 195 Q 160 202 150 202 Q 140 202 128 195 Z" fill="#E0AF83" opacity="0.5"/>

    <!-- Cheeks Blush -->
    <ellipse cx="118" cy="164" rx="12" ry="6.5" fill="#F2967C" opacity="0.55"/>
    <ellipse cx="182" cy="164" rx="12" ry="6.5" fill="#F2967C" opacity="0.55"/>

    <!-- Eyebrows -->
    <path d="M 110 123 Q 123 115 137 121" fill="none" stroke="#181818" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M 190 123 Q 177 115 163 121" fill="none" stroke="#181818" stroke-width="3.6" stroke-linecap="round"/>

    <!-- Eyes -->
    <path d="M 112 142 Q 125 133 138 141 Q 137 154 125 155 Q 114 154 112 142 Z" fill="#FFFFFF"/>
    <circle cx="127" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="127" cy="145" r="4" fill="#110B06"/>
    <circle cx="129.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="124" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 110 141 Q 124 130 140 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <path d="M 188 142 Q 175 133 162 141 Q 163 154 175 155 Q 186 154 188 142 Z" fill="#FFFFFF"/>
    <circle cx="173" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="173" cy="145" r="4" fill="#110B06"/>
    <circle cx="175.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="170" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 190 141 Q 176 130 160 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 148 156 Q 146 166 150 169 Q 153 171 156 168" fill="none" stroke="#BD7752" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Big happy smile -->
    <path d="M 125 178 Q 150 198 175 178 Q 150 183 125 178 Z" fill="#FFFFFF" stroke="#A83C2C" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 130 180 Q 150 188 170 180" stroke="#E57A68" stroke-width="1.8" fill="none"/>

    <!-- FULL COMPLETE HAIR: Crown dome + seamless straight bangs + long lush side locks -->
    <!-- Solid crown dome completely covering the top and sides of the head -->
    <path d="M 98 125 C 96 55 204 55 202 125 C 202 135 198 140 194 125 C 185 75 115 75 106 125 C 102 140 98 135 98 125 Z" fill="#1A1A1A" stroke="#0F172A" stroke-width="2"/>
    <path d="M 102 125 C 98 60 202 60 198 125 Z" fill="#1A1A1A"/>
    
    <!-- Seamless straight bangs across forehead -->
    <path d="M 102 110 Q 150 116 198 110 L 198 122 Q 150 128 102 122 Z" fill="#1A1A1A" stroke="#0F172A" stroke-width="1.8"/>
    <!-- Bang texture lines -->
    <path d="M 122 110 L 120 125" stroke="#2C2C2C" stroke-width="2"/>
    <path d="M 150 112 L 150 127" stroke="#2C2C2C" stroke-width="2"/>
    <path d="M 178 110 L 180 125" stroke="#2C2C2C" stroke-width="2"/>

    <!-- Long lush side locks framing cheeks and shoulders -->
    <path d="M 100 110 C 90 160 94 220 98 245 C 104 250 108 245 106 210 C 104 170 106 140 110 125 Z" fill="#1A1A1A" stroke="#0F172A" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 200 110 C 210 160 206 220 202 245 C 196 250 192 245 194 210 C 196 170 194 140 190 125 Z" fill="#1A1A1A" stroke="#0F172A" stroke-width="2" stroke-linejoin="round"/>

    <!-- Sparkles -->
    <g fill="#FFD700" opacity="0.85">
      <path d="M 85 110 Q 85 105 80 105 Q 85 105 85 100 Q 85 105 90 105 Q 85 105 85 110 Z"/>
      <circle cx="225" cy="110" r="2" fill="#60A5FA"/>
    </g>
  </g>

  <!-- Outer frame rings -->
  <circle cx="150" cy="172" r="140" fill="none" stroke="#D3E4FD" stroke-width="6"/>
  <circle cx="150" cy="172" r="143.5" fill="none" stroke="#BAD6FC" stroke-width="1.5"/>
</svg>
