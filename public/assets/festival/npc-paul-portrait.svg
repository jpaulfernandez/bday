    <!-- Ears -->
    <ellipse cx="101" cy="146" rx="7.5" ry="12" fill="#F3CBA5" stroke="#101820" stroke-width="1.8"/>
    <ellipse cx="199" cy="146" rx="7.5" ry="12" fill="#F3CBA5" stroke="#101820" stroke-width="1.8"/>

