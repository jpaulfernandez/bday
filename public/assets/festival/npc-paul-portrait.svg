<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <clipPath id="portraitCirclePaul">
      <circle cx="150" cy="172" r="140"/>
    </clipPath>
    <linearGradient id="bgGradPaul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="softShadowPaul" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Warm sunny amber/yellow backdrop circle -->
  <circle cx="150" cy="172" r="140" fill="url(#bgGradPaul)"/>

  <!-- Decorative party confetti & sparkles -->
  <g clip-path="url(#portraitCirclePaul)" opacity="0.6">
    <circle cx="60" cy="100" r="5" fill="#3B82F6"/>
    <circle cx="230" cy="80" r="4" fill="#EF4444"/>
    <rect x="40" y="220" width="8" height="8" rx="2" fill="#10B981" transform="rotate(25 40 220)"/>
    <rect x="240" y="230" width="10" height="6" rx="2" fill="#8B5CF6" transform="rotate(-15 240 230)"/>
    <path d="M 80 160 Q 85 155 90 160 Q 85 165 80 160 Z" fill="#F59E0B"/>
    <path d="M 220 160 Q 225 155 230 160 Q 225 165 220 160 Z" fill="#3B82F6"/>
  </g>

  <!-- MAIN PORTRAIT CONTENT -->
  <g clip-path="url(#portraitCirclePaul)">
    <!-- Outfit: Warm Brown striped fleece cardigan over dark navy tee -->
    <path d="M 85 344 Q 95 260 120 245 L 180 245 Q 205 260 215 344 Z" fill="#1C2833" stroke="#101820" stroke-width="2"/>
    
    <!-- Warm Brown Cardigan Jacket -->
    <path d="M 45 344 Q 55 250 110 236 L 190 236 Q 245 250 255 344 Z" fill="#5C3A21" stroke="#101820" stroke-width="2.2" stroke-linejoin="round" filter="url(#softShadowPaul)"/>
    <!-- Caramel Brown Stripes -->
    <path d="M 48 260 h65" stroke="#9C6B3B" stroke-width="8"/>
    <path d="M 187 260 h65" stroke="#9C6B3B" stroke-width="8"/>
    <path d="M 46 295 h67" stroke="#9C6B3B" stroke-width="8"/>
    <path d="M 187 295 h67" stroke="#9C6B3B" stroke-width="8"/>
    <path d="M 45 330 h69" stroke="#9C6B3B" stroke-width="8"/>
    <path d="M 186 330 h69" stroke="#9C6B3B" stroke-width="8"/>

    <!-- Jacket Collar & Placket Trim -->
    <path d="M 110 236 L 110 344" stroke="#1C2833" stroke-width="12"/>
    <path d="M 190 236 L 190 344" stroke="#1C2833" stroke-width="12"/>
    <path d="M 110 236 L 140 275 L 125 285 L 95 248 Z" fill="#4A2E18" stroke="#101820" stroke-width="1.8"/>
    <path d="M 190 236 L 160 275 L 175 285 L 205 248 Z" fill="#4A2E18" stroke="#101820" stroke-width="1.8"/>

    <!-- Neck -->
    <path d="M 136 190 L 136 245 Q 150 250 164 245 L 164 190 Z" fill="#F3CBA5"/>
    <path d="M 136 205 Q 150 217 164 205 L 164 190 L 136 190 Z" fill="#E0AF83" opacity="0.65"/>

    <!-- Face & Head -->
    <path d="M 104 130
             C 104 85 124 65 150 65
             C 176 65 196 85 196 130
             C 196 160 188 182 172 196
             C 164 203 156 207 150 207
             C 144 207 136 203 128 196
             C 112 182 104 160 104 130 Z"
