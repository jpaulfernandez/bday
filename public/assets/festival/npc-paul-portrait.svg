    <circle cx="127" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="127" cy="145" r="4" fill="#110B06"/>
    <circle cx="129.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="124" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 110 141 Q 124 130 140 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <path d="M 188 142 Q 175 133 162 141 Q 163 154 175 155 Q 186 154 188 142 Z" fill="#FFFFFF"/>
    <circle cx="173" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="173" cy="145" r="4" fill="#110B06"/>
    <circle cx="175.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="170" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 190 141 Q 176 130 160 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 148 156 Q 146 166 150 169 Q 153 171 156 168" fill="none" stroke="#BD7752" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Cheerful grin with braces -->
    <path d="M 125 178 Q 150 198 175 178 Z" fill="#FFFFFF" stroke="#A83C2C" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 128 183 Q 150 191 172 183" stroke="#B0BEC5" stroke-width="2.5" fill="none"/>
    <circle cx="138" cy="184.5" r="1.5" fill="#90A4AE"/>
    <circle cx="150" cy="186.5" r="1.5" fill="#90A4AE"/>
    <circle cx="162" cy="184.5" r="1.5" fill="#90A4AE"/>

    <!-- Curly hair with bangs -->
    <!-- Curly crown clusters -->
    <circle cx="110" cy="85" r="16" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <circle cx="125" cy="65" r="18" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <circle cx="150" cy="60" r="19" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <circle cx="175" cy="65" r="18" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <circle cx="190" cy="85" r="16" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <circle cx="102" cy="105" r="14" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <circle cx="198" cy="105" r="14" fill="#1C140E" stroke="#101820" stroke-width="2"/>
    <path d="M 102 110 C 95 65 130 50 150 50 C 170 50 205 65 198 110 Z" fill="#1C140E"/>

    <!-- Curly/wavy bangs drooping across forehead -->
    <path d="M 102 110 Q 116 126 130 112 Q 144 128 158 112 Q 172 128 186 112 Q 194 122 198 110 C 198 95 180 80 150 80 C 120 80 102 95 102 110 Z" fill="#1C140E" stroke="#101820" stroke-width="2" stroke-linejoin="round"/>
    <!-- Curl swirl lines in hair -->
    <path d="M 118 110 Q 124 118 130 110" stroke="#38291D" stroke-width="2.5" fill="none"/>
    <path d="M 146 110 Q 152 118 158 110" stroke="#38291D" stroke-width="2.5" fill="none"/>
    <path d="M 174 110 Q 180 118 186 110" stroke="#38291D" stroke-width="2.5" fill="none"/>

    <!-- Sparkles -->
    <g fill="#FFD700" opacity="0.85">
      <circle cx="230" cy="120" r="3" fill="#3B82F6"/>
      <path d="M 75 110 Q 75 104 69 104 Q 75 104 75 98 Q 75 104 81 104 Q 75 104 75 110 Z"/>
    </g>
  </g>

  <!-- Outer frame rings -->
  <circle cx="150" cy="172" r="140" fill="none" stroke="#FDE68A" stroke-width="6"/>
  <circle cx="150" cy="172" r="143.5" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
</svg>
