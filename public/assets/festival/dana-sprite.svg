<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 210" width="140" height="210">
  <defs>
    <linearGradient id="phoneGradSprite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2E33"/>
      <stop offset="100%" stop-color="#15161A"/>
    </linearGradient>
    <filter id="shadowSprite" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4E3524" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="70" cy="200" rx="34" ry="8" fill="#000" opacity="0.16"/>

  <!-- ============ NAPE HAIRS BEHIND NECK ============ -->
  <path d="M 58 70 Q 52 82 56 94 L 84 94 Q 88 82 82 70 Z" fill="#5E3F28"/>

  <!-- ============ LEGS: BLUE JEANS + CREAM SNEAKERS ============ -->
  <g>
    <rect x="52" y="148" width="15" height="38" rx="7" fill="#7C9EBF" stroke="#4E3524" stroke-width="1.4"/>
    <rect x="73" y="148" width="15" height="38" rx="7" fill="#88A9C9" stroke="#4E3524" stroke-width="1.4"/>
    <!-- rolled cuffs -->
    <rect x="51" y="176" width="17" height="6" rx="3" fill="#A9C4DA"/>
    <rect x="72" y="176" width="17" height="6" rx="3" fill="#A9C4DA"/>
    <!-- sneakers -->
    <path d="M50 184 h19 a6 6 0 0 1 6 7 l-1 4 h-26 a5 5 0 0 1 -5 -5 v-1 a6 6 0 0 1 7 -5 Z" fill="#F6F1E4" stroke="#4E3524" stroke-width="1.4"/>
    <path d="M71 184 h19 a6 6 0 0 1 6 7 l-1 4 h-26 a5 5 0 0 1 -5 -5 v-1 a6 6 0 0 1 7 -5 Z" fill="#EFE8D6" stroke="#4E3524" stroke-width="1.4"/>
    <rect x="49" y="190" width="30" height="4" rx="2" fill="#D9CFB6"/>
    <rect x="70" y="190" width="30" height="4" rx="2" fill="#D9CFB6"/>
  </g>

  <!-- ============ OUTFIT: WHITE COLLARED BLOUSE UNDER YELLOW FESTIVAL JACKET ============ -->
  <path d="M 50 100 L 90 100 L 90 150 Q 90 156 82 156 L 58 156 Q 50 156 50 150 Z" fill="#FAF6EC" stroke="#4E3524" stroke-width="1.5"/>
  <path d="M 52 144 h36 v4 h-36 Z" fill="#EBE3D0"/>
  <path d="M 70 110 L 70 150" stroke="#DCD2C0" stroke-width="1.2" stroke-dasharray="4,2"/>
  <circle cx="70" cy="118" r="1.5" fill="#E6DEC8"/>
  <circle cx="70" cy="130" r="1.5" fill="#E6DEC8"/>

  <!-- Crisp White Collar Points / Lapels -->
  <path d="M 58 84 L 70 98 L 62 104 L 52 88 Z" fill="#FAF6EC" stroke="#4E3524" stroke-width="1.4" stroke-linejoin="round" filter="url(#shadowSprite)"/>
  <path d="M 82 84 L 70 98 L 78 104 L 88 88 Z" fill="#FAF6EC" stroke="#4E3524" stroke-width="1.4" stroke-linejoin="round" filter="url(#shadowSprite)"/>

  <!-- Cropped Yellow Festival Jacket -->
  <path d="M 46 96 Q 44 88 52 84 L 88 84 Q 96 88 94 96 L 95 130 Q 95 138 87 138 L 53 138 Q 45 138 45 130 Z" fill="#F5D76E" stroke="#4E3524" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M 46 96 Q 44 88 52 84 L 88 84 Q 96 88 94 96 L 95 110 L 45 110 Z" fill="#F9E393"/>
  <!-- Open front trim -->
  <path d="M 64 94 L 64 136" stroke="#D9AE3F" stroke-width="2"/>
  <path d="M 76 94 L 76 136" stroke="#D9AE3F" stroke-width="2"/>
  <!-- Chest pockets -->
  <rect x="50" y="104" width="10" height="8" rx="2" fill="#E9C554" stroke="#D9AE3F" stroke-width="1"/>
  <!-- Sakura Blossom Badge on Jacket Lapel -->
  <g transform="translate(80, 108) scale(0.6)">
    <circle cx="0" cy="0" r="8" fill="#FFB7C5" stroke="#4E3524" stroke-width="1.5"/>
    <path d="M -4 -2 Q 0 -6 4 -2 Q 6 0 4 4 Q 0 6 -4 4 Q -6 0 -4 -2 Z" fill="#FF8DA1"/>
    <circle cx="0" cy="0" r="2" fill="#FFF"/>
  </g>
  <path d="M 45 132 Q 70 140 95 132 L 95 130 Q 95 138 87 138 L 53 138 Q 45 138 45 130 Z" fill="#D9AE3F" opacity="0.5"/>

  <!-- ============ ARMS & HANDS HOLDING 2 PHONES! (DUAL-WIELDING!) ============ -->
  <!-- Left arm (viewer left): Holding Phone 2 (Sleek silver/white phone!) -->
  <path d="M 46 94 Q 34 100 38 116 Q 40 126 47 124 Q 52 122 50 114 Q 47 104 50 98 Z" fill="#E9C554" stroke="#4E3524" stroke-width="1.5" stroke-linejoin="round"/>
  <g transform="translate(30, 114) rotate(8)">
    <rect x="0" y="0" width="18" height="30" rx="3.5" fill="#F0F2F5" stroke="#4E3524" stroke-width="1.2" filter="url(#shadowSprite)"/>
    <!-- Camera bump on back of phone 2 -->
    <rect x="9" y="3" width="7" height="8" rx="2" fill="#DCE0E6" stroke="#B8C0CC" stroke-width="0.5"/>
    <circle cx="11.5" cy="5.5" r="1.3" fill="#222"/>
    <circle cx="11.5" cy="8.5" r="1.3" fill="#222"/>
    <!-- Sakura blossom sticker on back -->
    <circle cx="9" cy="19" r="4" fill="#FFB7C5" opacity="0.85"/>
    <!-- Fingers gripping phone 2 -->
    <path d="M -2 10 Q -4 6 0 5 Q 3 5 4 8 L 2 16 Q -1 16 -2 10 Z" fill="#F3CBA5" stroke="#4E3524" stroke-width="1"/>
    <path d="M 16 8 Q 19 8 20 12 Q 20 16 16 15 Z" fill="#F3CBA5" stroke="#4E3524" stroke-width="1"/>
    <path d="M 16 14 Q 19 14 19 18 Q 18 22 16 20 Z" fill="#EFC398" stroke="#4E3524" stroke-width="1"/>
  </g>

  <!-- Right arm (viewer right): Holding Phone 1 (Black smartphone with cardholder!) -->
  <path d="M 94 94 Q 106 100 102 116 Q 100 126 93 124 Q 88 122 90 114 Q 93 104 90 98 Z" fill="#F5D76E" stroke="#4E3524" stroke-width="1.5" stroke-linejoin="round"/>
  <g transform="translate(92, 114) rotate(-8)">
    <rect x="0" y="0" width="18" height="30" rx="3.5" fill="url(#phoneGradSprite)" stroke="#4E3524" stroke-width="1.2" filter="url(#shadowSprite)"/>
    <!-- Camera bump on back of phone 1 -->
    <rect x="2" y="3" width="7" height="8" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
    <circle cx="4.5" cy="5.5" r="1.3" fill="#222"/>
    <circle cx="4.5" cy="8.5" r="1.3" fill="#222"/>
    <!-- Blue cardholder on back -->
    <rect x="2" y="13" width="14" height="15" rx="1.5" fill="#243447" stroke="#1A2634" stroke-width="0.6"/>
    <!-- Fingers gripping phone 1 -->
    <path d="M -2 10 Q -4 6 0 5 Q 3 5 4 8 L 2 16 Q -1 16 -2 10 Z" fill="#F3CBA5" stroke="#4E3524" stroke-width="1"/>
    <path d="M 16 8 Q 19 8 20 12 Q 20 16 16 15 Z" fill="#F3CBA5" stroke="#4E3524" stroke-width="1"/>
    <path d="M 16 14 Q 19 14 19 18 Q 18 22 16 20 Z" fill="#EFC398" stroke="#4E3524" stroke-width="1"/>
  </g>

  <!-- ============ HEAD & FACE ============ -->
  <g transform="translate(0, 4)">
    <!-- Neck -->
    <rect x="62" y="70" width="16" height="12" rx="5" fill="#F3CBA5"/>
    <rect x="62" y="70" width="16" height="6" rx="2" fill="#E0AF83" opacity="0.6"/>

    <!-- Face shape -->
    <ellipse cx="70" cy="48" rx="26" ry="25" fill="#F3CBA5" stroke="#4E3524" stroke-width="1.6"/>
    
    <!-- Ears -->
    <ellipse cx="43" cy="50" rx="4" ry="7" fill="#F3CBA5" stroke="#4E3524" stroke-width="1.5"/>
    <ellipse cx="97" cy="50" rx="4" ry="7" fill="#F3CBA5" stroke="#4E3524" stroke-width="1.5"/>
    <!-- Pearl Earrings -->
    <circle cx="43" cy="54" r="2" fill="#FAF6EC" stroke="#C9BDA4" stroke-width="0.8"/>
    <circle cx="97" cy="54" r="2" fill="#FAF6EC" stroke="#C9BDA4" stroke-width="0.8"/>

    <!-- Blush -->
    <ellipse cx="52" cy="57" rx="6" ry="3.5" fill="#F2967C" opacity="0.55"/>
    <ellipse cx="88" cy="57" rx="6" ry="3.5" fill="#F2967C" opacity="0.55"/>

    <!-- Eyebrows -->
    <path d="M 52 40 Q 58 37 64 40" stroke="#5B3E28" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 76 40 Q 82 37 88 40" stroke="#5B3E28" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- Eyes: Warm dark brown, bright & expressive -->
    <!-- Left eye -->
    <ellipse cx="58" cy="49" rx="4.5" ry="5.2" fill="#FFFFFF"/>
    <circle cx="58" cy="49" r="4" fill="#4A2E18"/>
    <circle cx="58" cy="49" r="2.2" fill="#1A1008"/>
    <circle cx="59.5" cy="47.5" r="1.3" fill="#FFFFFF"/>
    <path d="M 53 47 Q 58 44 63 47" fill="none" stroke="#2D1A0C" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right eye -->
    <ellipse cx="82" cy="49" rx="4.5" ry="5.2" fill="#FFFFFF"/>
    <circle cx="82" cy="49" r="4" fill="#4A2E18"/>
    <circle cx="82" cy="49" r="2.2" fill="#1A1008"/>
    <circle cx="83.5" cy="47.5" r="1.3" fill="#FFFFFF"/>
    <path d="M 77 47 Q 82 44 87 47" fill="none" stroke="#2D1A0C" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 69 56 Q 68 59 71 57" stroke="#C88E68" stroke-width="1.6" fill="none" stroke-linecap="round"/>

    <!-- ============ SUBTLER, NATURAL KISSY POUT (REDUCED SIZE!) ============ -->
    <g transform="translate(0, -1)">
      <!-- Outer lip crease -->
      <ellipse cx="70" cy="63" rx="7" ry="5" fill="#E0AF83" opacity="0.3"/>
      <!-- Upper puckered lip -->
      <path d="M 65.5 61 Q 68 58 70 59.5 Q 72 58 74.5 61 Q 72 62.5 70 62 Q 68 62.5 65.5 61 Z" fill="#D96B58" stroke="#A83C2C" stroke-width="0.9" stroke-linejoin="round"/>
      <!-- Lower puckered lip -->
      <path d="M 65.5 61 Q 68 62.5 70 62 Q 72 62.5 74.5 61 Q 72 66 70 66 Q 68 66 65.5 61 Z" fill="#E57A68" stroke="#A83C2C" stroke-width="0.9" stroke-linejoin="round"/>
      <!-- Glossy white highlight dot -->
      <ellipse cx="68.8" cy="64" rx="1.5" ry="0.8" fill="#FFFFFF" opacity="0.8" transform="rotate(-8 68.8 64)"/>
    </g>

    <!-- ============ HAIR: BASE & SHORTER FACE-FRAMING TENDRILS ============ -->
    <!-- Hair crown cap -->
    <path d="M 44 48 Q 40 24 62 18 Q 84 12 96 30 Q 100 38 96 48 Q 94 34 87 28 Q 80 22 68 24 Q 64 27 62 32 Q 56 28 50 34 Q 45 40 44 48 Z" fill="#6E4B2F" stroke="#4E3524" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Wispy side bangs -->
    <path d="M 62 24 Q 78 20 88 30 Q 94 37 94 48 Q 90 34 82 29 Q 72 24 62 26 Z" fill="#7B5638" opacity="0.85"/>
    <path d="M 46 42 Q 49 30 58 25 Q 51 34 49 44 Q 47 46 46 48 Z" fill="#B08350"/>

    <!-- Left Face-Framing Tendril (Reduced length: ear/cheek level!) -->
    <path d="M 46 44
             C 42 54 43 62 40 66
             C 39 68 42 70 44 66
             C 46 60 45 52 48 44
             Z"
          fill="#7B5638" stroke="#4E3524" stroke-width="1.3" stroke-linejoin="round"/>
    <path d="M 44 50 Q 43 58 43 64" stroke="#B08350" stroke-width="1" fill="none"/>

    <!-- Right Face-Framing Tendril (Reduced length: ear/cheek level!) -->
    <path d="M 94 44
             C 98 54 97 62 100 66
             C 101 68 98 70 96 66
             C 94 60 95 52 92 44
             Z"
          fill="#7B5638" stroke="#4E3524" stroke-width="1.3" stroke-linejoin="round"/>
    <path d="M 96 50 Q 97 58 97 64" stroke="#B08350" stroke-width="1" fill="none"/>

    <!-- ============ GLASSES: SLEEK THIN WIREFRAME (ROUNDED POLYGONAL) ============ -->
    <!-- Gold/champagne wireframes -->
    <g fill="none" stroke="#C8966E" stroke-width="2.2" stroke-linejoin="round">
      <!-- Left lens -->
      <path d="M 48 46 Q 48 40 54 40 L 62 40 Q 66 40 66 46 L 65 56 Q 64 61 60 61 L 53 61 Q 49 61 48 56 Z"/>
      <!-- Right lens -->
      <path d="M 74 46 Q 74 40 80 40 L 88 40 Q 94 40 94 46 L 93 56 Q 92 61 88 61 L 81 61 Q 75 61 74 56 Z"/>
      <!-- Bridge -->
      <path d="M 66 46 Q 70 43 74 46" stroke-width="2"/>
      <!-- Wire temples -->
      <path d="M 48 45 L 43 43" stroke-width="1.8"/>
      <path d="M 94 45 L 99 43" stroke-width="1.8"/>
    </g>
    <!-- Lens sheen -->
    <g fill="#FFFFFF" opacity="0.12">
      <path d="M 49 46 Q 49 41 54 41 L 62 41 Q 65 41 65 46 L 64 56 Q 63 60 60 60 L 53 60 Q 50 60 49 56 Z"/>
      <path d="M 75 46 Q 75 41 80 41 L 88 41 Q 93 41 93 46 L 92 56 Q 91 60 88 60 L 81 60 Q 76 60 75 56 Z"/>
    </g>
    <path d="M 51 45 L 58 58" stroke="#FFFFFF" stroke-width="1.8" opacity="0.45" stroke-linecap="round"/>
    <path d="M 77 45 L 84 58" stroke="#FFFFFF" stroke-width="1.8" opacity="0.45" stroke-linecap="round"/>

    <!-- Playful sparkle near her hair -->
    <path d="M 38 32 Q 38 29 35 29 Q 38 29 38 26 Q 38 29 41 29 Q 38 29 38 32 Z" fill="#FFD700"/>
    <circle cx="102" cy="35" r="1.5" fill="#FFAEC9"/>
  </g>

  <!-- ============ THE HIGH MESSY BUN ("PINEAPPLE BUN") WITH SPIKY ENDS ============ -->
  <g filter="url(#shadowSprite)" transform="translate(0, 4)">
    <!-- Bun base volume on crown -->
    <path d="M 52 18 C 46 8 58 -2 70 -1 C 82 -2 94 8 88 18 Z" fill="#6E4B2F" stroke="#4E3524" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Overlapping messy loops -->
    <path d="M 55 14 Q 64 -1 76 2 Q 88 5 82 16 Q 70 8 55 14 Z" fill="#7B5638" stroke="#4E3524" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M 60 7 Q 70 -2 80 5 Q 86 11 78 15 Q 68 7 60 7 Z" fill="#8A6240"/>
    <!-- Caramel highlights -->
    <path d="M 62 12 Q 70 -1 78 5" fill="none" stroke="#B08350" stroke-width="2" stroke-linecap="round"/>
    <path d="M 58 9 Q 66 1 74 6" fill="none" stroke="#C79A64" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Spiky top-knot bun ends sticking up and out -->
    <g fill="none" stroke="#5E3F28" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 60 -1 Q 55 -8 51 -9"/>
      <path d="M 64 -3 Q 62 -11 58 -13"/>
      <path d="M 70 -5 Q 70 -13 68 -15"/>
      <path d="M 75 -4 Q 78 -11 81 -13"/>
      <path d="M 80 0 Q 86 -7 90 -7"/>
      <path d="M 84 5 Q 91 -1 95 0"/>
      <path d="M 54 4 Q 48 -1 45 0"/>
    </g>
    <g fill="none" stroke="#B08350" stroke-width="1.4" stroke-linecap="round">
      <path d="M 62 -2 Q 58 -9 55 -11"/>
      <path d="M 72 -4 Q 74 -10 76 -12"/>
      <path d="M 78 1 Q 84 -5 87 -6"/>
      <path d="M 56 2 Q 51 -3 48 -2"/>
    </g>
  </g>
</svg>
