<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <clipPath id="portraitCircleNath">
      <circle cx="150" cy="172" r="140"/>
    </clipPath>
    <linearGradient id="bgGradNath" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="softShadowNath" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4E3524" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Soft lavender/indigo backdrop circle -->
  <circle cx="150" cy="172" r="140" fill="url(#bgGradNath)"/>

  <!-- Decorative floating pearls & sparkles -->
  <g clip-path="url(#portraitCircleNath)" opacity="0.6">
    <circle cx="60" cy="90" r="6" fill="#FAF6EC" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="230" cy="85" r="5" fill="#FAF6EC" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="45" cy="230" r="4" fill="#FAF6EC" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="245" cy="240" r="7" fill="#FAF6EC" stroke="#E5E7EB" stroke-width="1.5"/>
    <path d="M 80 150 Q 85 145 90 150 Q 85 155 80 150 Z" fill="#818CF8"/>
    <path d="M 220 170 Q 225 165 230 170 Q 225 175 220 170 Z" fill="#A78BFA"/>
  </g>

  <!-- MAIN PORTRAIT CONTENT -->
  <g clip-path="url(#portraitCircleNath)">
    <!-- Back hair: Warm brown curly fluffy bun/ponytail puff tied back -->
    <g>
      <circle cx="100" cy="170" r="28" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
      <circle cx="125" cy="195" r="32" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
      <circle cx="175" cy="195" r="32" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
      <circle cx="200" cy="170" r="28" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
      <path d="M 95 170 Q 150 240 205 170 Z" fill="#5C3A21"/>
      <!-- Curl texture highlights on bun puff -->
      <path d="M 110 185 Q 130 200 150 185" stroke="#8B5A2B" stroke-width="3" fill="none"/>
      <path d="M 150 185 Q 170 200 190 185" stroke="#8B5A2B" stroke-width="3" fill="none"/>
    </g>

    <!-- Outfit: Lilac striped knit top under Cream/beige open coat -->
    <!-- Lilac sweater base -->
    <path d="M 85 344 Q 95 260 120 245 L 180 245 Q 205 260 215 344 Z" fill="#D8C6E5" stroke="#241710" stroke-width="2"/>
    <path d="M 87 270 h126" stroke="#8A6EA8" stroke-width="6"/>
    <path d="M 88 295 h124" stroke="#8A6EA8" stroke-width="6"/>
    <path d="M 87 320 h126" stroke="#8A6EA8" stroke-width="6"/>

    <!-- Cream open coat jacket -->
    <path d="M 45 344 Q 55 250 110 236 L 190 236 Q 245 250 255 344 Z" fill="#EDE4D3" stroke="#241710" stroke-width="2.2" stroke-linejoin="round" filter="url(#softShadowNath)"/>
    <!-- Coat trim & lapels -->
    <path d="M 110 236 L 110 344" stroke="#D8C6E5" stroke-width="10"/>
    <path d="M 190 236 L 190 344" stroke="#D8C6E5" stroke-width="10"/>
    <path d="M 110 236 L 140 275 L 125 285 L 95 248 Z" fill="#DFD4C0" stroke="#241710" stroke-width="1.8"/>
    <path d="M 190 236 L 160 275 L 175 285 L 205 248 Z" fill="#DFD4C0" stroke="#241710" stroke-width="1.8"/>

    <!-- Neck -->
    <path d="M 136 190 L 136 245 Q 150 250 164 245 L 164 190 Z" fill="#F3CBA5"/>
    <path d="M 136 205 Q 150 217 164 205 L 164 190 L 136 190 Z" fill="#E0AF83" opacity="0.65"/>

    <!-- Face & Head -->
    <path d="M 104 130
             C 104 85 124 65 150 65
             C 176 65 196 85 196 130
             C 196 160 188 182 172 196
             C 164 203 156 207 150 207
             C 144 207 136 203 128 196
             C 112 182 104 160 104 130 Z"
          fill="#F3CBA5" stroke="#241710" stroke-width="2"/>

    <!-- Ears -->
    <ellipse cx="101" cy="146" rx="7.5" ry="12" fill="#F3CBA5" stroke="#241710" stroke-width="1.8"/>
    <ellipse cx="199" cy="146" rx="7.5" ry="12" fill="#F3CBA5" stroke="#241710" stroke-width="1.8"/>
    <!-- PEARL EARRINGS -->
    <circle cx="101" cy="156" r="6" fill="#FAF6EC" stroke="#C9BDA4" stroke-width="1.5"/>
    <circle cx="199" cy="156" r="6" fill="#FAF6EC" stroke="#C9BDA4" stroke-width="1.5"/>
    <circle cx="99" cy="154" r="1.5" fill="#FFFFFF"/>
    <circle cx="197" cy="154" r="1.5" fill="#FFFFFF"/>

    <!-- Jawline shadow under chin -->
    <path d="M 128 195 Q 150 208 172 195 Q 160 202 150 202 Q 140 202 128 195 Z" fill="#E0AF83" opacity="0.5"/>

    <!-- Cheeks Blush -->
    <ellipse cx="118" cy="164" rx="12" ry="6.5" fill="#F2967C" opacity="0.55"/>
    <ellipse cx="182" cy="164" rx="12" ry="6.5" fill="#F2967C" opacity="0.55"/>

    <!-- Eyebrows -->
    <path d="M 110 123 Q 123 115 137 121" fill="none" stroke="#4A2E18" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M 190 123 Q 177 115 163 121" fill="none" stroke="#4A2E18" stroke-width="3.6" stroke-linecap="round"/>

    <!-- Eyes -->
    <path d="M 112 142 Q 125 133 138 141 Q 137 154 125 155 Q 114 154 112 142 Z" fill="#FFFFFF"/>
    <circle cx="127" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="127" cy="145" r="4" fill="#110B06"/>
    <circle cx="129.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="124" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 110 141 Q 124 130 140 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <path d="M 188 142 Q 175 133 162 141 Q 163 154 175 155 Q 186 154 188 142 Z" fill="#FFFFFF"/>
    <circle cx="173" cy="145" r="7.5" fill="#3B2616"/>
    <circle cx="173" cy="145" r="4" fill="#110B06"/>
    <circle cx="175.5" cy="142" r="2.2" fill="#FFFFFF"/>
    <circle cx="170" cy="148" r="1" fill="#FFFFFF"/>
    <path d="M 190 141 Q 176 130 160 139" fill="none" stroke="#110B06" stroke-width="3" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 148 156 Q 146 166 150 169 Q 153 171 156 168" fill="none" stroke="#BD7752" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Sweet warm smile with teeth -->
    <path d="M 125 178 Q 150 198 175 178 Q 150 183 125 178 Z" fill="#FFFFFF" stroke="#A83C2C" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 130 180 Q 150 188 170 180" stroke="#E57A68" stroke-width="1.8" fill="none"/>

    <!-- Warm Brown Curly Hair Base & Wavy Face-Framing Tendrils -->
    <!-- Curly Crown Cap -->
    <circle cx="110" cy="75" r="18" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
    <circle cx="130" cy="58" r="20" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
    <circle cx="150" cy="54" r="21" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
    <circle cx="170" cy="58" r="20" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
    <circle cx="190" cy="75" r="18" fill="#5C3A21" stroke="#241710" stroke-width="2"/>
    <path d="M 102 125 Q 95 65 150 54 Q 205 65 198 125 Q 195 95 178 82 Q 160 68 135 72 Q 120 76 115 88 Q 108 80 98 96 Q 90 110 102 125 Z" fill="#5C3A21" stroke="#241710" stroke-width="2" stroke-linejoin="round"/>
    <!-- Highlight curl lines on crown -->
    <path d="M 120 72 Q 135 84 150 72 Q 165 84 180 72" stroke="#8B5A2B" stroke-width="3" fill="none"/>

    <!-- Left Wavy/Curly Face-Framing Tendril -->
    <path d="M 106 115 Q 90 145 104 165 Q 118 185 100 205 C 96 210 104 215 108 205 Q 122 180 108 160 Q 98 140 110 115 Z" fill="#5C3A21" stroke="#241710" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 104 135 Q 96 150 104 165" stroke="#8B5A2B" stroke-width="2" fill="none"/>

    <!-- Right Wavy/Curly Face-Framing Tendril -->
    <path d="M 194 115 Q 210 145 196 165 Q 182 185 200 205 C 204 210 196 215 192 205 Q 178 180 192 160 Q 202 140 190 115 Z" fill="#5C3A21" stroke="#241710" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 196 135 Q 204 150 196 165" stroke="#8B5A2B" stroke-width="2" fill="none"/>

    <!-- Sparkles -->
    <g fill="#FFD700" opacity="0.85">
      <path d="M 85 100 Q 85 95 80 95 Q 85 95 85 90 Q 85 95 90 95 Q 85 95 85 100 Z"/>
      <circle cx="225" cy="110" r="2.5" fill="#818CF8"/>
    </g>
  </g>

  <!-- Outer frame rings -->
  <circle cx="150" cy="172" r="140" fill="none" stroke="#C7D2FE" stroke-width="6"/>
  <circle cx="150" cy="172" r="143.5" fill="none" stroke="#818CF8" stroke-width="1.5"/>
</svg>
